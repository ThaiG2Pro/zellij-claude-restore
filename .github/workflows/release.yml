name: release

# Build the WASM plugin and attach it to a GitHub Release whenever a v* tag is
# pushed, so users can `install.sh` (download mode) without a Rust toolchain.
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32-wasip1 target
        run: |
          rustup update stable
          rustup default stable
          rustup target add wasm32-wasip1

      - name: Build plugin (binary crate → emits _start)
        run: cargo build --release --target wasm32-wasip1

      - name: Publish release with the .wasm asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/wasm32-wasip1/release/zellij-claude-sync.wasm
          body: |
            Prebuilt `zellij-claude-sync.wasm` for **zellij 0.44.x** (zellij-tile =0.44.2).
            If your zellij version differs, build from source instead (`ZCS_MODE=build ./install.sh`).
